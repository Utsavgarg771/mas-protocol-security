version: '3.8'

services:
  # MAS Orchestrator / Supervisor Node
  mas-orchestrator:
    image: python:3.10-slim
    container_name: mas-orchestrator
    working_dir: /app
    volumes:
      - ./:/app
    command: tail -f /dev/null # Placeholder to keep container alive
    environment:
      - ROLE=orchestrator
      - PROTOCOL=MCP
    networks:
      - agent-network

  # Scalable Agent Nodes (AutoGen / LangGraph Workers)
  agent-worker:
    image: python:3.10-slim
    working_dir: /app
    volumes:
      - ./:/app
    command: tail -f /dev/null # Placeholder to keep container alive
    deploy:
      replicas: 3 # Start with a small scale, easily scaled to 50-100 later
    environment:
      - ROLE=worker
    networks:
      - agent-network

  # Spark Master for Logging & Analytics Pipelines
  spark-master:
    image: bitnami/spark:latest
    container_name: spark-master
    environment:
      - SPARK_MODE=master
      - SPARK_RPC_AUTHENTICATION_ENABLED=no
      - SPARK_RPC_ENCRYPTION_ENABLED=no
      - SPARK_LOCAL_STORAGE_ENCRYPTION_ENABLED=no
      - SPARK_SSL_ENABLED=no
    ports:
      - "8080:8080"
      - "7077:7077"
    networks:
      - agent-network

  # Adversarial Attack Simulation Node
  attack-simulator:
    image: python:3.10-slim
    container_name: attack-simulator
    working_dir: /app
    volumes:
      - ./attacks:/app/attacks
    command: tail -f /dev/null # Placeholder to keep container alive
    networks:
      - agent-network

networks:
  agent-network:
    driver: bridge