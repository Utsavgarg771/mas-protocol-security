version: '3.8'

services:
  # MAS Semantic Bridge Middleware Node
  protocol-bridge:
    image: python:3.10-slim
    container_name: protocol-bridge
    working_dir: /app
    volumes:
      - ./:/app
    command: tail -f /dev/null
    environment:
      - ROLE=bridge_middleware
      - CORE_FRAMEWORK=LangGraph
    networks:
      - bridging-network

  # Heterogeneous Agent Environment (MCP/A2A Nodes)
  agent-orchestrator:
    image: python:3.10-slim
    container_name: agent-orchestrator
    working_dir: /app
    volumes:
      - ./:/app
    command: tail -f /dev/null
    environment:
      - ROLE=orchestrator
    networks:
      - bridging-network

  # Apache Spark Master for Overhead Metric Logging (Latency & Token Cost)
  spark-master:
    image: bitnami/spark:latest
    container_name: spark-master
    environment:
      - SPARK_MODE=master
      - SPARK_RPC_AUTHENTICATION_ENABLED=no
    ports:
      - "8080:8080"
      - "7077:7077"
    networks:
      - bridging-network

networks:
  bridging-network:
    driver: bridge
